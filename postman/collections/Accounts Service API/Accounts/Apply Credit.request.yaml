$kind: http-request
name: Apply Credit
method: POST
url: '{{baseUrl}}/accounts/:id/credit'
order: 4000
description: Applies a credit (positive or negative) to an account balance.
pathVariables:
  - key: id
    value: 'a1'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "amount": 25
    }
